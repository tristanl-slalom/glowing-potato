<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Potato Data Dashboard</title>
    <link rel="stylesheet" href="styles.css">

</head>
<body>
    <div class="container">
        <header>
            <h1>🥔 Potato Data Dashboard</h1>
            <p class="subtitle">Global Potato Production & Popular Foods</p>
        </header>

        <main>
            <section class="chart-section">
                <h2>Global Potato Production Over Time</h2>
                <div class="chart-container">
                    <canvas id="cropChart"></canvas>
                </div>
                <p class="data-source" id="dataSource"></p>
            </section>

            <section class="foods-section">
                <h2>Popular Potato-Based Foods Worldwide</h2>
                <div class="foods-grid" id="foodsGrid">
                    <div class="loading">Loading...</div>
                </div>
            </section>
        </main>

        <footer>
            <p>Data visualization for potato crop production and popular foods</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
